<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Galería</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#111;
      color:white;
      text-align:center;
    }

    h1{
      padding:30px;
      margin:0;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:10px;
      padding:10px;
    }

    .gallery img{
      width:100%;
      height:300px;
      object-fit:cover;
      border-radius:10px;
    }

    .download{
      display:inline-block;
      margin:10px;
      padding:10px 20px;
      background:white;
      color:black;
      text-decoration:none;
      border-radius:5px;
      font-weight:bold;
    }

  </style>
</head>
<body>

<h1>Fotografías Competiciones Rítmica</h1>

<div class="gallery">

  <div>
    <img src="https://picsum.photos/id/1015/1200/800">
    <br>
    <a class="download" href="https://picsum.photos/id/1015/1200/800" download>
      Descargar HD
    </a>
  </div>

  <div>
    <img src="https://picsum.photos/id/1016/1200/800">
    <br>
    <a class="download" href="https://picsum.photos/id/1016/1200/800" download>
      Descargar HD
    </a>
  </div>

  <div>
    <img src="https://picsum.photos/id/1018/1200/800">
    <br>
    <a class="download" href="https://picsum.photos/id/1018/1200/800" download>
      Descargar HD
    </a>
  </div>

</div>

</body>
</html>
